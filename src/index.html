<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plantitas con Flow 🌿</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
<h1>🌿 Plantitas con Flow 🌿</h1>
<p>Adopta una plantita hoy 💚</p>
</header>

<section id="lista">

<div class="producto">
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
    <h3>🌵 Cactus Mini</h3>
    <p>Decoración simple</p>
    <button onclick="verProducto('Cactus Mini 🌵','Perfecto para escritorio','RD$100','https://images.unsplash.com/photo-1501004318641-b39e6451bec6')">
        Comprar
    </button>
</div>

<div class="producto">
    <img src="https://images.unsplash.com/photo-1509423350716-97f2360af3e4">
    <h3>🌱 Suculenta</h3>
    <p>Estilo moderno</p>
    <button onclick="verProducto('Suculenta 🌱','Maceta personalizada','RD$150','https://images.unsplash.com/photo-1509423350716-97f2360af3e4')">
        Comprar
    </button>
</div>

<div class="producto">
    <img src="https://images.unsplash.com/photo-1524594154908-edddebb6c8c4">
    <h3>💚 Kit Anti-estrés</h3>
    <p>Relajación total</p>
    <button onclick="verProducto('Kit 💚','Incluye mensaje','RD$200','https://images.unsplash.com/photo-1524594154908-edddebb6c8c4')">
        Comprar
    </button>
</div>

</section>

<section id="detalle">
    <div class="detalle-card">
        <img id="imagen">
        <h2 id="nombre"></h2>
        <p id="desc"></p>
        <h3 id="precio"></h3>

        <button onclick="comprar()">Comprar</button><br><br>
        <button onclick="volver()">⬅ Volver</button>
    </div>
</section>

<script>
function verProducto(nombre, desc, precio, img) {
    document.getElementById("lista").style.display = "none";
    document.getElementById("detalle").style.display = "block";

    document.getElementById("nombre").textContent = nombre;
    document.getElementById("desc").textContent = desc;
    document.getElementById("precio").textContent = precio;
    document.getElementById("imagen").src = img;
}

function volver() {
    document.getElementById("lista").style.display = "flex";
    document.getElementById("detalle").style.display = "none";
}

function comprar() {
    alert("🌱 ¡Gracias por tu compra!");
}
</script>

</body>
</html>
